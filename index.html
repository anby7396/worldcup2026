<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 世界杯 · 赛程 + 预测助手</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">🏆</span>
      <div>
        <h1>2026 世界杯</h1>
        <p class="sub">美 · 加 · 墨 &nbsp;|&nbsp; 48 队 · 12 组 · 104 场</p>
      </div>
    </div>
    <nav class="tabs" id="tabs">
      <button class="tab active" data-view="format">赛制</button>
      <button class="tab" data-view="schedule">赛程</button>
      <button class="tab" data-view="groups">积分榜</button>
      <button class="tab" data-view="bracket">淘汰赛</button>
      <button class="tab" data-view="predictor">预测助手</button>
    </nav>
  </header>

  <main id="app">
    <div class="loading">加载中…</div>
  </main>

  <footer class="foot">
    <span>数据为本地维护的结构化数据集，比分可手动更新（保存在浏览器本地）。</span>
    <button id="resetBtn" class="ghost-btn" title="清空你录入的所有比分">重置比分</button>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
